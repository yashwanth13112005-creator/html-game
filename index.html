<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Target Click Game</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
}

h1 {
    margin: 20px;
}

/* Game Area */
.game {
    position: relative;
    height: 80vh;
}

/* Hide checkbox */
input {
    display: none;
}

/* Target style */
.target {
    width: 70px;
    height: 70px;
    background: radial-gradient(circle, red, darkred);
    border-radius: 50%;
    position: absolute;
    cursor: pointer;
    animation: move 5s infinite alternate ease-in-out;
}

/* Different positions */
.t1 { top: 20%; left: 10%; animation-delay: 0s; }
.t2 { top: 50%; left: 40%; animation-delay: 1s; }
.t3 { top: 30%; left: 70%; animation-delay: 2s; }
.t4 { top: 70%; left: 20%; animation-delay: 3s; }
.t5 { top: 60%; left: 80%; animation-delay: 4s; }

/* Movement animation */
@keyframes move {
    0% { transform: translate(0,0); }
    100% { transform: translate(50px, -50px); }
}

/* When clicked → disappear */
input:checked + .target {
    opacity: 0;
    pointer-events: none;
}

/* Score Display */
.score {
    margin-top: 20px;
    font-size: 22px;
}

/* CSS Score Trick */
#t1:checked ~ .score::after { content: "1"; }
#t2:checked ~ .score::after { content: "2"; }
#t3:checked ~ .score::after { content: "3"; }
#t4:checked ~ .score::after { content: "4"; }
#t5:checked ~ .score::after { content: "5"; }

.score::after {
    content: "0";
    color: #38bdf8;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>🎯 Target Click Game</h1>

<div class="game">

    <input type="checkbox" id="t1">
    <label for="t1" class="target t1"></label>

    <input type="checkbox" id="t2">
    <label for="t2" class="target t2"></label>

    <input type="checkbox" id="t3">
    <label for="t3" class="target t3"></label>

    <input type="checkbox" id="t4">
    <label for="t4" class="target t4"></label>

    <input type="checkbox" id="t5">
    <label for="t5" class="target t5"></label>

    <div class="score">Score: </div>

</div>

</body>
</html>
